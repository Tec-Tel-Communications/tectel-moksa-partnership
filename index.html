  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ap;\n  src: url(\"716e9f0f-de99-4510-8f55-98957bf3a6e6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"bbd31e32-fb06-45bd-b29c-d04e130ffebd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ====================================================================\n   Tec-Tel × Dragonfruit AI — Aisle Safety Microsite\n   Design system ported from the Aisle Intelligence Brochure:\n   navy / blue / violet · Manrope + JetBrains Mono · molecular logo\n   ==================================================================== */\n\n:root {\n  --navy:        #1F2A44;\n  --navy-deep:   #131A2B;\n  --navy-700:    #2A375A;\n  --navy-50:     #EEF1F8;\n  --blue:        #2E75B6;\n  --blue-50:     #E8F1FA;\n  --blue-100:    #D2E2F2;\n  --violet:      #6B4DE6;\n  --violet-50:   #EEEAFC;\n  --violet-100:  #DCD3F8;\n  --paper:       #FFFFFF;\n  --ink:         #0F1115;\n  --ink-2:       #3A4456;\n  --ink-3:       #6B7488;\n  --ink-4:       #9AA3B5;\n  --rule:        #DDE2EA;\n  --rule-2:      #ECEFF4;\n  --tint:        #F5F7FB;\n  --green-ok:    #1F7A4D;\n  --danger:      #E04D4D;\n\n  --maxw: 1180px;\n  --gut: 40px;\n  --r: 14px;\n  --shadow-card: 0 1px 0 rgba(15,25,50,.04), 0 22px 50px -28px rgba(15,25,50,.30), 0 6px 16px -10px rgba(15,25,50,.12);\n}\n\n*, *::before, *::after { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; scroll-padding-top: 92px; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--paper);\n  font-family: \"Manrope\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  color: var(--ink);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: geometricPrecision;\n  font-feature-settings: \"ss01\", \"kern\", \"liga\", \"cv11\";\n  line-height: 1.5;\n}\nimg { display: block; max-width: 100%; }\na { color: inherit; }\n.mono { font-family: \"JetBrains Mono\", ui-monospace, monospace; }\n\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }\n\n/* —— Texture utilities —— */\n.tex-dots-d {\n  background-image: radial-gradient(rgba(255,255,255,.07) 1px, transparent 1px);\n  background-size: 18px 18px;\n}\n.tex-grid-d {\n  background-image:\n    linear-gradient(rgba(46,117,182,.10) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(46,117,182,.10) 1px, transparent 1px);\n  background-size: 30px 30px;\n}\n\n/* ====================================================================\n   NAV\n   ==================================================================== */\n.nav {\n  position: sticky; top: 0; z-index: 60;\n  background: rgba(255,255,255,.86);\n  backdrop-filter: saturate(180%) blur(14px);\n  border-bottom: 1px solid var(--rule);\n}\n.nav__row {\n  display: flex; align-items: center; gap: 28px;\n  height: 70px;\n}\n.nav__lockup { display: flex; align-items: center; gap: 12px; }\n.nav__logo { height: 24px; width: auto; }\n.nav__div { width: 1px; height: 18px; background: var(--rule); }\n.nav__partner {\n  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--ink-3); font-weight: 700; white-space: nowrap;\n}\n.nav__partner b { color: var(--ink); }\n.nav__dot {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--violet);\n  display: inline-block; margin-right: 7px;\n  box-shadow: 0 0 0 3px rgba(107,77,230,.18);\n}\n.nav__links { display: flex; gap: 26px; margin-left: auto; }\n.nav__links a {\n  text-decoration: none; font-size: 13.5px; font-weight: 600; color: var(--ink-2);\n  letter-spacing: -0.01em; transition: color .15s;\n}\n.nav__links a:hover { color: var(--blue); }\n.nav__cta {\n  text-decoration: none;\n  background: var(--blue); color: #fff;\n  font-size: 13px; font-weight: 700; letter-spacing: -0.01em;\n  padding: 11px 18px; border-radius: 999px;\n  white-space: nowrap; transition: background .15s, transform .15s;\n}\n.nav__cta:hover { background: #265f95; transform: translateY(-1px); }\n\n/* ====================================================================\n   BUTTONS / CHIPS / EYEBROWS  (shared)\n   ==================================================================== */\n.btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  text-decoration: none; font-weight: 700; font-size: 14px; letter-spacing: -0.01em;\n  padding: 14px 22px; border-radius: 999px; cursor: pointer; border: 0;\n  transition: background .15s, transform .15s, border-color .15s;\n}\n.btn--primary { background: var(--blue); color: #fff; }\n.btn--primary:hover { background: #265f95; transform: translateY(-1px); }\n.btn--ghost-d { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.28); }\n.btn--ghost-d:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }\n.btn--ghost { background: transparent; color: var(--navy); border: 1px solid var(--rule); }\n.btn--ghost:hover { border-color: var(--blue); color: var(--blue); }\n.btn .arrow { transition: transform .15s; }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 11px;\n  font-family: \"JetBrains Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;\n  font-weight: 600; color: var(--blue);\n  margin: 0 0 18px;\n}\n.eyebrow::before { content: \"\"; width: 28px; height: 1px; background: currentColor; }\n.eyebrow--violet { color: var(--violet); }\n.eyebrow--ink { color: var(--ink-3); }\n\n.section { padding: 96px 0; }\n.section--tint { background: var(--tint); }\n.h2 {\n  font-weight: 800; font-size: clamp(30px, 4vw, 46px); line-height: 1.04;\n  letter-spacing: -0.03em; color: var(--navy); margin: 0 0 18px; max-width: 16ch;\n  text-wrap: balance;\n}\n.h2 em { font-style: normal; color: var(--blue); }\n.h2 em.v { color: var(--violet); }\n.lede {\n  font-size: 17px; line-height: 1.6; color: var(--ink-2); max-width: 60ch; margin: 0;\n}\n.lede b { color: var(--navy); font-weight: 700; }\n\n/* ====================================================================\n   HERO\n   ==================================================================== */\n.hero {\n  background: var(--navy-deep); color: #fff; position: relative; overflow: hidden;\n}\n.hero__glow {\n  position: absolute; top: -260px; right: -180px; width: 680px; height: 680px;\n  background: radial-gradient(circle, rgba(46,117,182,.28), transparent 60%);\n  pointer-events: none;\n}\n.hero__glow2 {\n  position: absolute; bottom: -340px; left: -220px; width: 720px; height: 720px;\n  background: radial-gradient(circle, rgba(107,77,230,.20), transparent 62%);\n  pointer-events: none;\n}\n.hero__texture { position: absolute; inset: 0; opacity: .5; pointer-events: none; }\n.hero__inner {\n  position: relative; z-index: 2;\n  display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: center;\n  padding: 70px 0 84px;\n}\n.prepared {\n  display: inline-flex; align-items: center; gap: 9px;\n  font-family: \"JetBrains Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: rgba(255,255,255,.7); font-weight: 600;\n  border: 1px solid rgba(255,255,255,.18); border-radius: 999px;\n  padding: 8px 14px; margin-bottom: 26px;\n}\n.prepared .live {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--violet);\n  box-shadow: 0 0 0 3px rgba(107,77,230,.25);\n}\n.hero h1 {\n  font-weight: 800; font-size: clamp(38px, 5.2vw, 62px); line-height: 1.0;\n  letter-spacing: -0.035em; margin: 0 0 24px; color: #fff; text-wrap: balance;\n}\n.hero h1 em { font-style: normal; color: var(--blue); }\n.hero__sub {\n  font-size: 17px; line-height: 1.62; color: rgba(255,255,255,.74); max-width: 50ch; margin: 0 0 30px;\n}\n.hero__sub b { color: #fff; font-weight: 600; }\n.hero__ctas { display: flex; flex-wrap: wrap; gap: 14px; }\n\n/* live-feed card (hero + alert reuse) */\n.feed {\n  position: relative; border-radius: var(--r); overflow: hidden;\n  border: 1px solid rgba(255,255,255,.12);\n  background: #0E1626;\n  box-shadow: 0 40px 80px -30px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);\n}\n.feed__img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; opacity: .96; }\n.feed__hud {\n  position: absolute; top: 14px; left: 14px; right: 14px;\n  display: flex; align-items: center; justify-content: space-between;\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,.75);\n}\n.feed__hud .l { display: flex; align-items: center; gap: 9px; }\n.feed__rec {\n  width: 8px; height: 8px; border-radius: 50%; background: var(--danger);\n  box-shadow: 0 0 0 3px rgba(224,77,77,.25); animation: blink 1.6s steps(2) infinite;\n}\n@keyframes blink { 50% { opacity: .3; } }\n.feed__foot {\n  position: absolute; left: 14px; right: 14px; bottom: 14px;\n  display: flex; align-items: center; justify-content: space-between;\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  letter-spacing: 0.1em; color: rgba(255,255,255,.7);\n}\n/* detection bounding box */\n.det {\n  position: absolute; border: 1.5px solid var(--blue); border-radius: 3px;\n  box-shadow: 0 0 0 1px rgba(46,117,182,.25), 0 0 28px rgba(46,117,182,.3);\n}\n.det__lbl {\n  position: absolute; top: -25px; left: -1.5px;\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px; letter-spacing: 0.04em;\n  background: var(--blue); color: #fff; padding: 3px 8px; border-radius: 3px 3px 3px 0;\n  white-space: nowrap; font-weight: 600;\n}\n.det--violet { border-color: var(--violet); box-shadow: 0 0 0 1px rgba(107,77,230,.25), 0 0 28px rgba(107,77,230,.3); }\n.det--violet .det__lbl { background: var(--violet); }\n\n/* hero stat chips */\n.chips {\n  position: relative; z-index: 2;\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;\n  border-top: 1px solid rgba(255,255,255,.12);\n}\n.chip { padding: 26px 26px 30px; border-right: 1px solid rgba(255,255,255,.12); }\n.chip:last-child { border-right: 0; }\n.chip b {\n  display: block; font-size: 19px; font-weight: 800; letter-spacing: -0.02em; color: #fff;\n  margin-bottom: 5px;\n}\n.chip span { font-size: 12.5px; color: rgba(255,255,255,.62); line-height: 1.4; }\n\n/* ====================================================================\n   RISK SECTION\n   ==================================================================== */\n.risk-feature {\n  margin-top: 40px;\n  display: grid; grid-template-columns: 300px 1fr; gap: 0;\n  border: 1px solid var(--rule); border-radius: var(--r); overflow: hidden;\n  box-shadow: var(--shadow-card); background: var(--paper);\n}\n.risk-feature__num {\n  background: var(--navy-deep); color: #fff; padding: 40px 34px;\n  display: flex; flex-direction: column; justify-content: center;\n  position: relative; overflow: hidden;\n}\n.risk-feature__num .tag {\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--blue); font-weight: 600; margin-bottom: 14px;\n}\n.risk-feature__num .big {\n  font-size: 76px; font-weight: 800; letter-spacing: -0.04em; line-height: .92; color: #fff;\n}\n.risk-feature__num .cap { font-size: 14px; color: rgba(255,255,255,.7); margin-top: 6px; font-weight: 600; }\n.risk-feature__body { padding: 38px 38px 34px; }\n.risk-feature__body p { font-size: 16px; line-height: 1.62; color: var(--ink-2); margin: 0 0 18px; }\n.risk-feature__body p b { color: var(--navy); font-weight: 700; }\n.cite { font-size: 12.5px; color: var(--ink-3); line-height: 1.6; }\n.cite a { color: var( enter; padding:0 8px; background:var(--paper); color:var(--ink-3); font-size:22px; font-weight:300;\">→<\u002Fdiv>\n        <div style=\"background:var(--blue-50); padding:24px 22px; display:flex; flex-direction:column; gap:7px;\">\n          <span class=\"mono\" style=\"font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; color:var(--blue);\">Tec-Tel<\u002Fspan>\n          <div style=\"font-size:16px; font-weight:800; color:var(--navy); letter-spacing:-0.01em;\">The nationwide deploy<\u002Fdiv>\n          <div style=\"font-size:13px; color:var(--ink-2); line-height:1.5;\">Install, edge devices, and onboarding, store by store, anywhere in the country.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flow-arrow\" style=\"display:flex; align-items:center; justify-content:center; padding:0 8px; background:var(--paper); color:var(--ink-3); font-size:22px; font-weight:300;\">→<\u002Fdiv>\n        <div style=\"background:var(--paper); padding:24px 22px; display:flex; flex-direction:column; gap:7px;\">\n          <span class=\"mono\" style=\"font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; color:var(--ink-3);\">Result<\u002Fspan>\n          <div style=\"font-size:16px; font-weight:800; color:var(--navy); letter-spacing:-0.01em;\">Live at scale<\u002Fdiv>\n          <div style=\"font-size:13px; color:var(--ink-2); line-height:1.5;\">Hundreds of sites monitored, one seamless rollout, one relationship.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal two-col\" style=\"margin-top:22px; display:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n        <div style=\"border:1px solid var(--rule); border-radius:var(--r); padding:22px 24px; background:var(--paper); box-shadow:var(--shadow-card); border-top:3px solid var(--violet);\">\n          <div class=\"mono\" style=\"font-size:11px; font-weight:700; letter-spacing:0.03em; color:var(--violet); margin-bottom:8px;\">mokSa → Tec-Tel<\u002Fdiv>\n          <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">Best-in-class retail loss-prevention AI to layer onto our installs — and a real <b style=\"color:var(--navy);\">foothold in retail and convenience stores<\u002Fb>, a vertical your niche opens for us.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--rule); border-radius:var(--r); padding:22px 24px; background:var(--paper); box-shadow:var(--shadow-card); border-top:3px solid var(--blue);\">\n          <div class=\"mono\" style=\"font-size:11px; font-weight:700; letter-spacing:0.03em; color:var(--blue); margin-bottom:8px;\">Tec-Tel → mokSa<\u002Fdiv>\n          <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">The nationwide field force you’re missing. We handle install, edge devices, and onboarding for <b style=\"color:var(--navy);\">7-Eleven- and BP-scale rollouts<\u002Fb>, so you close enterprise without building a national ops team. You don’t sell cameras — when a site needs hardware, that flows through us too.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reveal\" style=\"margin-top:18px; background:var(--navy-deep); color:#fff; border-radius:var(--r); padding:24px 30px; font-size:14px; line-height:1.6;\">\n        <b style=\"color:#fff;\">Plus joint go-to-market.<\u002Fb> <span style=\"color:rgba(255,255,255,.78);\">Point your team and ours at the same retail and c-store targets — a campaign that pairs your detection results with our install muscle. You asked to work with our marketing team on positioning; that’s the door.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 MARKETS -->\n  <section class=\"section section--tint\" id=\"markets\">\n    <div class=\"wrap\">\n      <div class=\"reveal\" style=\"max-width:64ch;\">\n        <div class=\"eyebrow eyebrow--violet\">04 · Where it wins first<\u002Fdiv>\n        <h2 class=\"h2\">Your niche, <em class=\"v\">our reach.<\u002Fem><\u002Fh2>\n        <p class=\"lede\">Three places the combined offer lands first — and one already sits live in our pipeline.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"reveal markets-3\" style=\"margin-top:40px; display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--rule); border:1px solid var(--rule); border-radius:var(--r); overflow:hidden; box-shadow:var(--shadow-card);\">\n        <div style=\"background:var(--paper); padding:26px 24px;\">\n          <div style=\"font-size:17px; font-weight:800; color:var(--navy); letter-spacing:-0.01em;\">Convenience stores<\u002Fdiv>\n          <div class=\"mono\" style=\"font-size:11px; color:var(--violet); font-weight:600; letter-spacing:0.03em; margin-top:6px;\">Your strongest traction<\u002Fdiv>\n          <p style=\"font-size:13px; color:var(--ink-2); margin-top:14px; line-height:1.55;\">Theft and concealment at c-store scale — your models, our install across a chain’s footprint, priced to work for both SMB and enterprise.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper); padding:26px 24px;\">\n          <div style=\"font-size:17px; font-weight:800; color:var(--navy); letter-spacing:-0.01em;\">Enterprise retail rollouts<\u002Fdiv>\n          <div class=\"mono\" style=\"font-size:11px; color:var(--blue); font-weight:600; letter-spacing:0.03em; margin-top:6px;\">7-Eleven · BP<\u002Fdiv>\n          <p style=\"font-size:13px; color:var(--ink-2); margin-top:14px; line-height:1.55;\">You have the relationships and the AI. We bring the nationwide crews that make a multi-hundred-site deployment actually happen on schedule.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper); padding:26px 24px;\">\n          <div style=\"font-size:17px; font-weight:800; color:var(--navy); letter-spacing:-0.01em;\">A first proof-point<\u002Fdiv>\n          <div class=\"mono\" style=\"font-size:11px; color:var(--blue); font-weight:600; letter-spacing:0.03em; margin-top:6px;\">Live in our pipeline<\u002Fdiv>\n          <p style=\"font-size:13px; color:var(--ink-2); margin-top:14px; line-height:1.55;\">We have large-scale camera projects moving now that could be the first deployment we run together and point to.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 NEXT STEPS / CTA -->\n  <section class=\"cta\" id=\"next\">\n    <div class=\"cta__glow\"><\u002Fdiv>\n    <div class=\"wrap\">\n      <div class=\"cta__inner\">\n        <div class=\"reveal\">\n          <div class=\"eyebrow\" style=\"color:#7db4e6;\">05 · Next steps<\u002Fdiv>\n          <h2>Small moves that turn the<br>intro into a <em>rollout.<\u002Fem><\u002Fh2>\n          <p class=\"cta__sub\">A short, clear path forward from our introduction — a few things each side owns to line up the first joint deployment.<\u002Fp>\n          <ul style=\"list-style:none; margin:8px 0 0; padding:0; display:grid; gap:12px;\">\n            <li style=\"display:grid; grid-template-columns:34px 1fr 92px; gap:14px; align-items:center; font-size:13.5px; line-height:1.5; color:rgba(255,255,255,.82); border-top:1px solid rgba(255,255,255,.12); padding-top:12px;\"><span class=\"mono\" style=\"color:#9d86ff; font-weight:700;\">01<\u002Fspan><span>Connect mokSa with <b style=\"color:#fff;\">Tec-Tel’s marketing team<\u002Fb> to position for SMB and enterprise retail<\u002Fspan><span class=\"mono\" style=\"font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:rgba(255,255,255,.5); text-align:right;\">Both<\u002Fspan><\u002Fli>\n            <li style=\"display:grid; grid-template-columns:34px 1fr 92px; gap:14px; align-items:center; font-size:13.5px; line-height:1.5; color:rgba(255,255,255,.82); border-top:1px solid rgba(255,255,255,.12); padding-top:12px;\"><span class=\"mono\" style=\"color:#9d86ff; font-weight:700;\">02<\u002Fspan><span>Scope a <b style=\"color:#fff;\">joint campaign<\u002Fb> in your strongest ver
